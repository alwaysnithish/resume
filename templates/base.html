<!DOCTYPE html>
<html lang="en" data-theme="light">
<head><meta name="referrer" content="no-referrer-when-downgrade">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#ffffff" />
  <title>{% block title %}QuantumCV{% endblock %} — AI Resume Architect</title>

  <!-- Preconnect for Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

  {% load static %}
  <link rel="stylesheet" href="{% static 'css/base.css' %}" />
  {% block extra_css %}{% endblock %}
</head>
<body>

  {% block body %}{% endblock %}

  <div id="toast-container"></div>

  <!-- Theme must load first to prevent flash -->
  <script src="{% static 'js/theme.js' %}"></script>
  {% block extra_js %}{% endblock %}
</body>
</html>
